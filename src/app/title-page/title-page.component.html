<div class="min-h-screen bg-gradient-to-b from-base-300 to-base-100 flex flex-col items-center justify-center p-5">
  <div class="flex flex-col items-center space-y-6 max-w-lg w-full">
    <h1 class="text-4xl font-bold tracking-tight text-primary sm:text-6xl text-shadow text-center">
      Chico Degens Poker Club
    </h1>
    <p class="text-base-content/60 text-lg text-center">Deal me in.</p>
    <div class="w-full flex justify-center">
      <img
        class="max-w-sm w-full rounded-xl shadow-2xl border border-base-content/10"
        src="../../assets/title.png"
        alt="Chico Degens Poker Club"
      />
    </div>
    <div class="divider divider-primary w-48 mx-auto"></div>
    <div class="flex items-center justify-center gap-4">
      <button class="btn btn-secondary btn-lg" (click)="openRegisterUserModal()">
        Register
      </button>
      <button class="btn btn-primary btn-lg" (click)="openLoginModal()">
        Login
      </button>
    </div>
    <a class="btn btn-ghost btn-sm opacity-50" routerLink="/game">
      Preview Game Table
    </a>
  </div>
</div>
