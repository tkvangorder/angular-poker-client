
<div class="flex flex-col gap-6 p-4 md:p-6 max-w-7xl mx-auto">
  <!-- Page header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
    <div>
      <h1 class="text-2xl font-bold">Game Lobby</h1>
      <p class="text-sm text-base-content/50 mt-0.5">Find a game or create your own</p>
    </div>
    <div class="flex items-center gap-3">
      <label class="label cursor-pointer gap-2">
        <input type="checkbox" id="completedGames" name="completedGames"
               class="toggle toggle-sm toggle-primary"
               [checked]="showCompleted"
               (change)="toggleShowCompleted()">
        <span class="label-text text-sm">Completed</span>
      </label>
      @if (isAdmin) {
        <button class="btn btn-primary btn-sm" (click)="openCreateCashGameModal()">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
          </svg>
          New Game
        </button>
      }
    </div>
  </div>

  <!-- Main content -->
  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Game list -->
    <div class="lg:w-3/5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xs font-semibold text-base-content/50 uppercase tracking-widest">Available Games</h2>
      </div>
      <div class="max-h-[calc(100vh-220px)] overflow-y-auto p-1">
        <app-cash-game-list></app-cash-game-list>
      </div>
    </div>

    <!-- Game details -->
    <div class="lg:w-2/5">
      <h2 class="text-xs font-semibold text-base-content/50 uppercase tracking-widest mb-3">Game Details</h2>
      <div class="lg:sticky lg:top-4">
        <app-cash-game-details></app-cash-game-details>
      </div>
    </div>
  </div>
</div>
